# sshmon config
# Скопируйте в ~/.config/sshmon/config.yaml

interval: 5s

servers:
  - name: web1
    host: 203.0.113.10
    port: 22
    user: root
    key: ~/.ssh/id_ed25519
    # password: secret          # вместо ключа (или ssh-agent)
    # insecure_host_key: true   # не проверять host key

thresholds:
  cpu: 90
  mem: 90
  disk: 90

llm:
  provider: openai              # openai | anthropic | любой OpenAI-совместимый
  # base_url: http://localhost:11434/v1   # например Ollama
  model: gpt-4o-mini
  api_key_env: OPENAI_API_KEY
  # api_key: sk-...             # либо ключ прямо здесь
